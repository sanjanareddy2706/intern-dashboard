<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
</head>
<body>
<h2>Login</h2>

<input placeholder="Email"><br><br>
<input type="password" placeholder="Password"><br><br>

<button onclick="login()">Login</button>

<script>
function login() {
  localStorage.setItem("loggedIn", "true");
  window.location.href = "/";
}
</script>
</body>
</html>
