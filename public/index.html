<!DOCTYPE html>
<html>
<head>
  <title>Intern Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <script>
    if (!localStorage.getItem("loggedIn")) {
      window.location.href = "/login.html";
    }
  </script>
  <div class="page-wrap">
    <header class="top-bar">
      <div class="brand">Intern Dashboard</div>
      <nav>
        <button onclick="logout()" class="btn-logout">Logout</button>
        <a href="leaderboard.html" class="link">Leaderboard</a>
      </nav>
    </header>

    <main class="dashboard">
      <section class="card form-card">
        <h2>Add Intern</h2>
        <form id="internForm" class="intern-form">
          <div class="form-row">
            <label for="name">Name</label>
            <input type="text" id="name" placeholder="Name" required>
          </div>
          <div class="form-row">
            <label for="role">Role</label>
            <input type="text" id="role" placeholder="Role" required>
          </div>
          <div class="form-row">
            <label for="referralCode">Referral Code</label>
            <input type="text" id="referralCode" placeholder="Referral Code">
          </div>
          <div class="form-row">
            <label for="donations">Donations (₹)</label>
            <input type="number" id="donations" placeholder="0" min="0">
          </div>
          <button type="submit" class="btn-primary">Add Intern</button>
        </form>
      </section>

      <section class="card list-card">
        <div class="list-header">
          <h2>Interns</h2>
          <div class="controls">
            <input type="search" id="searchInput" placeholder="Search name..." />
            <select id="sortSelect">
              <option value="latest">Latest</option>
              <option value="donationsDesc">Donations: High → Low</option>
              <option value="donationsAsc">Donations: Low → High</option>
            </select>
          </div>
        </div>
        <ul id="internList" class="intern-list"></ul>
      </section>

      <section class="card rewards-card">
        <h2>Rewards</h2>
        <ul>
          <li>🎁 T-shirt - Unlock at ₹1000</li>
          <li>🏆 Certificate - Unlock at ₹5000</li>
          <li>💻 Internship Badge</li>
        </ul>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
  <script>
    function logout() {
      localStorage.removeItem("loggedIn");
      window.location.href = "/login.html";
    }
  </script>
</body>
</html>
